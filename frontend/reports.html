<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — Quality Inspection Agent</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app-layout">
  
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🔍</div>
      <div class="logo-text">
        <span class="logo-title">QUALITY AI</span>
        <span class="logo-sub">Inspection Agent</span>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main Menu</div>
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon">📊</span> Dashboard
      </a>
      <a href="inspection.html" class="nav-item">
        <span class="nav-icon">📸</span> New Inspection
      </a>
      <a href="history.html" class="nav-item">
        <span class="nav-icon">📋</span> History
      </a>
      <a href="reports.html" class="nav-item active">
        <span class="nav-icon">📄</span> Reports
      </a>
      
      <div class="nav-section-label" style="margin-top: 16px;">Management</div>
      <a href="admin.html" class="nav-item" id="nav-admin">
        <span class="nav-icon">⚙️</span> Admin Panel
      </a>
    </nav>
    
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="sidebar-user-avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebar-user-name">Loading...</div>
          <div class="user-role" id="sidebar-user-role">...</div>
        </div>
        <button class="btn-logout" id="btn-logout" title="Logout">🚪</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-title">Generated Reports</div>
    </header>
    
    <!-- Page Content -->
    <div class="page-content">
      
      <div class="card">
        <div class="card-header border-bottom pb-3">
          <div class="card-title">PDF Inspection Reports</div>
        </div>
        
        <div class="card-body">
          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Report Code</th>
                  <th>Inspection Code</th>
                  <th>Product</th>
                  <th>Summary</th>
                  <th>Size (KB)</th>
                  <th>Generated By</th>
                  <th>Generated At</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="reports-table-body">
                <tr><td colspan="8" class="text-center text-muted py-4">Loading data...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      
    </div>
  </main>
</div>

<!-- Loading overlay for download -->
<div class="loading-overlay" id="download-loader">
  <div class="spinner"></div>
  <div class="loading-text">Downloading PDF...</div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/reports.js"></script>
<script src="js/chatbot.js"></script>`n</body>
</html>
