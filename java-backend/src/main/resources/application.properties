# ============================================================
#  Quality Inspection Agent — Spring Boot Configuration
# ============================================================

spring.application.name=quality-inspection-backend

# ------ Server ------
server.port=8080
server.servlet.context-path=/api

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:qualitydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate (Auto create schema)
spring.jpa.hibernate.ddl-auto=update

# Enable H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security (JWT)
jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
jwt.expiration=86400000

# ------ File Upload ------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ------ JWT ------
app.jwt.secret=QualityInspectionAgentSuperSecretKey2024!@#$%^&*()
app.jwt.expiration-ms=86400000

# ------ AI Service ------
app.ai.service-url=http://localhost:5000
app.ai.predict-endpoint=/predict
app.ai.timeout-seconds=30

# ------ File Storage ------
app.upload.dir=uploads
app.reports.dir=reports

# ------ CORS ------
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# ------ Logging ------
logging.level.com.qualityinspection=INFO
logging.level.org.springframework.security=WARN
